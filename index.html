<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Map Fold</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--panel:#181818;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;--accent:#fff}
body{background:var(--bg);color:var(--text);font-family:'Outfit','Helvetica Neue',sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden}
#panel{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:14px}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg);position:relative}
canvas{display:block;cursor:crosshair}
canvas.dragging{cursor:grabbing}
.section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.row label{flex:1;font-size:11px;color:var(--muted)}
input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:12px;outline:none;width:100%}
input[type=range]{flex:1;accent-color:var(--accent)}
input[type=color]{width:36px;height:26px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0}
.btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;transition:border-color .15s;width:100%}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:#ddd}
.btn-danger{border-color:#ff4444;color:#ff4444}
.btn-danger:hover{background:#ff4444;color:#fff}
#status{font-size:11px;color:var(--muted);min-height:16px}
.val-label{font-size:11px;color:var(--text);width:28px;text-align:right}
.step-indicator{display:flex;gap:6px;margin-bottom:4px}
.step{flex:1;padding:5px;text-align:center;border-radius:6px;font-size:11px;border:1px solid var(--border);color:var(--muted)}
.step.active{border-color:var(--accent);color:var(--accent)}
.step.done{border-color:#444;color:#888;background:#1a1a1a}
.hint{font-size:10px;color:var(--muted);line-height:1.5;margin-top:4px}
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="panel">

  <div>
    <div class="step-indicator">
      <div class="step active" id="step1-ind">1. Fold</div>
      <div class="step" id="step2-ind">2. Map</div>
    </div>
  </div>

  <!-- Step 1: Fold -->
  <div id="step1-panel">
    <div class="section-title">Draw Creases</div>
    <p class="hint">Click and drag on the canvas to draw fold lines. Each line folds the paper along that crease.</p>
    <div class="row" style="margin-top:8px">
      <label>Fold angle</label>
      <input type="range" id="fold-angle" min="0" max="180" value="120" step="1"/>
      <span class="val-label" id="fold-val">120°</span>
    </div>
    <div class="row">
      <label>Paper color</label>
      <input type="color" id="paper-color" value="#f0ece4"/>
    </div>
    <div class="row">
      <label>Show grid</label>
      <input type="checkbox" id="show-grid" checked/>
    </div>
    <div style="display:flex;gap:8px;margin-top:4px">
      <button class="btn btn-danger" id="btn-undo" style="flex:1">Undo</button>
      <button class="btn btn-danger" id="btn-clear" style="flex:1">Clear</button>
    </div>
    <button class="btn btn-primary" id="btn-to-step2" style="margin-top:8px">Apply Map →</button>
  </div>

  <!-- Step 2: Map -->
  <div id="step2-panel" style="display:none">
    <div class="section-title">Location</div>
    <div class="row" style="gap:6px">
      <input type="text" id="loc-input" placeholder="Tokyo, Shanghai, London…" style="flex:1"/>
      <button class="btn btn-primary" id="btn-load" style="width:auto;padding:5px 12px">→</button>
    </div>
    <div id="status">Enter a location</div>

    <div class="section-title" style="margin-top:12px">Layers</div>
    <div class="row"><label>Roads</label><input type="checkbox" id="layer-roads" checked/></div>
    <div class="row"><label>Rivers</label><input type="checkbox" id="layer-rivers" checked/></div>
    <div class="row"><label>Coastline</label><input type="checkbox" id="layer-coast" checked/></div>

    <div class="section-title" style="margin-top:12px">Style</div>
    <div class="row">
      <label>Line color</label>
      <input type="color" id="line-color" value="#1a1208"/>
    </div>
    <div class="row">
      <label>Stroke width</label>
      <input type="range" id="stroke-w" min="0.5" max="4" value="1" step="0.5"/>
      <span class="val-label" id="stroke-val">1</span>
    </div>
    <div class="row">
      <label>Opacity</label>
      <input type="range" id="line-opacity" min="10" max="100" value="80" step="5"/>
      <span class="val-label" id="opacity-val">80%</span>
    </div>

    <button class="btn" id="btn-back" style="margin-top:8px">← Back to Fold</button>

    <div class="section-title" style="margin-top:12px">Export</div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="btn-export-png" style="flex:1">PNG</button>
      <button class="btn" id="btn-export-svg" style="flex:1">SVG</button>
    </div>
  </div>

</div>

<div id="canvas-area">
  <canvas id="main-canvas" width="720" height="720"></canvas>
</div>

<script>
var W = 720, H = 720;
var canvas = document.getElementById('main-canvas');
var ctx = canvas.getContext('2d');

// ── State ──────────────────────────────────────────────────────────────────
var creases = []; // [{x1,y1,x2,y2,angle}]
var drawingCrease = null; // {x1,y1,x2,y2} while dragging
var currentStep = 1;
var rawRoads = [], rawRivers = [], rawCoast = [];
var roadsBounds = null;

// ── Canvas mouse: draw creases ─────────────────────────────────────────────
var mouseDown = false;
var startPt = null;

canvas.addEventListener('mousedown', function(e) {
  if (currentStep !== 1) return;
  mouseDown = true;
  var pt = getCanvasPt(e);
  startPt = pt;
  drawingCrease = { x1: pt.x, y1: pt.y, x2: pt.x, y2: pt.y };
  canvas.classList.add('dragging');
});

canvas.addEventListener('mousemove', function(e) {
  if (!mouseDown || currentStep !== 1) return;
  var pt = getCanvasPt(e);
  drawingCrease.x2 = pt.x;
  drawingCrease.y2 = pt.y;
  render();
});

canvas.addEventListener('mouseup', function(e) {
  if (!mouseDown || currentStep !== 1) return;
  mouseDown = false;
  canvas.classList.remove('dragging');
  var pt = getCanvasPt(e);
  var dx = pt.x - startPt.x, dy = pt.y - startPt.y;
  if (Math.sqrt(dx*dx+dy*dy) > 10) {
    var angle = parseInt(document.getElementById('fold-angle').value);
    creases.push({ x1: startPt.x, y1: startPt.y, x2: pt.x, y2: pt.y, angle: angle });
  }
  drawingCrease = null;
  render();
});

canvas.addEventListener('mouseleave', function() {
  if (mouseDown && currentStep === 1) {
    mouseDown = false;
    canvas.classList.remove('dragging');
    if (drawingCrease) {
      var dx = drawingCrease.x2 - drawingCrease.x1;
      var dy = drawingCrease.y2 - drawingCrease.y1;
      if (Math.sqrt(dx*dx+dy*dy) > 10) {
        var angle = parseInt(document.getElementById('fold-angle').value);
        creases.push({ x1: drawingCrease.x1, y1: drawingCrease.y1, x2: drawingCrease.x2, y2: drawingCrease.y2, angle: angle });
      }
    }
    drawingCrease = null;
    render();
  }
});

function getCanvasPt(e) {
  var rect = canvas.getBoundingClientRect();
  var scaleX = W / rect.width;
  var scaleY = H / rect.height;
  return { x: (e.clientX - rect.left) * scaleX, y: (e.clientY - rect.top) * scaleY };
}

// ── Fold transform ─────────────────────────────────────────────────────────
// For a point P, apply all creases in order.
// Each crease is a line segment that extends across the canvas.
// Points on one side get reflected across the crease line, scaled by fold angle.
function applyFolds(px, py) {
  var x = px, y = py;
  var bright = 1.0;

  for (var i = 0; i < creases.length; i++) {
    var c = creases[i];
    var angle = c.angle * Math.PI / 180;

    // Extend crease to full canvas line
    var dx = c.x2 - c.x1, dy = c.y2 - c.y1;
    var len = Math.sqrt(dx*dx+dy*dy);
    if (len < 1) continue;
    var nx = -dy/len, ny = dx/len; // normal to crease

    // Signed distance from crease line
    var dist = (x - c.x1) * nx + (y - c.y1) * ny;

    // Only fold points on the positive side
    if (dist > 0) {
      // Fold: reflect partially based on angle
      // angle=0 → no fold, angle=180 → full reflection
      var t = angle / Math.PI; // 0..1
      var newDist = dist * (1 - 2 * t * Math.sin(angle/2) * Math.sin(angle/2));
      x = x + nx * (newDist - dist);
      y = y + ny * (newDist - dist);
      // Folded face gets darker
      bright *= (0.3 + 0.7 * Math.cos(angle * 0.5));
    }
  }
  return { x: x, y: y, bright: bright };
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  var paperColor = document.getElementById('paper-color').value;
  var showGrid = document.getElementById('show-grid').checked;

  ctx.fillStyle = paperColor;
  ctx.fillRect(0, 0, W, H);

  // Grid on paper (shows fold deformation clearly)
  if (showGrid) {
    var gridStep = 40;
    ctx.save();
    // Draw grid lines through fold transform
    var pr = hexToRgb(paperColor);
    var gridColor = 'rgba('+(pr.r-30)+','+(pr.g-30)+','+(pr.b-30)+',0.4)';
    ctx.strokeStyle = gridColor;
    ctx.lineWidth = 0.5;
    // Horizontal grid lines
    for (var gy = 0; gy <= H; gy += gridStep) {
      ctx.beginPath();
      var started = false;
      for (var gx = 0; gx <= W; gx += 4) {
        var f = applyFolds(gx, gy);
        if (!started) { ctx.moveTo(f.x, f.y); started = true; }
        else ctx.lineTo(f.x, f.y);
      }
      ctx.stroke();
    }
    // Vertical grid lines
    for (var gx2 = 0; gx2 <= W; gx2 += gridStep) {
      ctx.beginPath();
      var started2 = false;
      for (var gy2 = 0; gy2 <= H; gy2 += 4) {
        var f2 = applyFolds(gx2, gy2);
        if (!started2) { ctx.moveTo(f2.x, f2.y); started2 = true; }
        else ctx.lineTo(f2.x, f2.y);
      }
      ctx.stroke();
    }
    ctx.restore();
  }

  // Paper shading (brightness based on fold)
  if (creases.length > 0) {
    var sampleStep = 8;
    for (var sx = 0; sx < W; sx += sampleStep) {
      for (var sy = 0; sy < H; sy += sampleStep) {
        var fpt = applyFolds(sx + sampleStep/2, sy + sampleStep/2);
        if (fpt.bright < 0.99) {
          ctx.fillStyle = 'rgba(0,0,0,'+(0.5*(1-fpt.bright))+')';
          ctx.fillRect(sx, sy, sampleStep, sampleStep);
        }
      }
    }
  }

  // Draw existing creases
  creases.forEach(function(c) {
    drawCreaseLine(c.x1, c.y1, c.x2, c.y2, 'rgba(80,80,80,0.7)', 1.5);
  });

  // Draw active crease being drawn
  if (drawingCrease) {
    drawCreaseLine(drawingCrease.x1, drawingCrease.y1, drawingCrease.x2, drawingCrease.y2, 'rgba(255,255,255,0.8)', 2);
  }

  // Draw map data if in step 2
  if (currentStep === 2 && roadsBounds) {
    drawMapLayers();
  }
}

function drawCreaseLine(x1, y1, x2, y2, color, width) {
  // Extend line to canvas edges
  var dx = x2 - x1, dy = y2 - y1;
  var len = Math.sqrt(dx*dx+dy*dy);
  if (len < 1) return;
  var t1 = -Math.max(W, H);
  var t2 = Math.max(W, H);
  var ex1 = x1 + dx/len * t1, ey1 = y1 + dy/len * t1;
  var ex2 = x1 + dx/len * t2, ey2 = y1 + dy/len * t2;
  ctx.save();
  ctx.setLineDash([6, 4]);
  ctx.beginPath();
  ctx.moveTo(ex1, ey1);
  ctx.lineTo(ex2, ey2);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.stroke();
  ctx.setLineDash([]);
  ctx.restore();
}

// ── Map rendering ──────────────────────────────────────────────────────────
function normalizePt(lat, lon, bounds) {
  var cx = (bounds.minLon + bounds.maxLon) / 2;
  var cy = (bounds.minLat + bounds.maxLat) / 2;
  var span = Math.max(bounds.maxLat - bounds.minLat, bounds.maxLon - bounds.minLon);
  return {
    x: W/2 + (lon - cx) / span * W * 0.88,
    y: H/2 - (lat - cy) / span * H * 0.88
  };
}

function drawMapLayers() {
  var lineColor = document.getElementById('line-color').value;
  var strokeW = parseFloat(document.getElementById('stroke-w').value);
  var opacity = parseInt(document.getElementById('line-opacity').value) / 100;
  var rgb = hexToRgb(lineColor);

  function drawLayer(roads, r, g, b, sw) {
    roads.forEach(function(road) {
      if (road.length < 2) return;
      for (var i = 0; i < road.length - 1; i++) {
        var p0 = normalizePt(road[i][0], road[i][1], roadsBounds);
        var p1 = normalizePt(road[i+1][0], road[i+1][1], roadsBounds);
        var f0 = applyFolds(p0.x, p0.y);
        var f1 = applyFolds(p1.x, p1.y);
        var bright = (f0.bright + f1.bright) / 2;
        ctx.beginPath();
        ctx.moveTo(f0.x, f0.y);
        ctx.lineTo(f1.x, f1.y);
        ctx.strokeStyle = 'rgba('+r+','+g+','+b+','+(opacity * bright)+')';
        ctx.lineWidth = sw;
        ctx.lineCap = 'round';
        ctx.stroke();
      }
    });
  }

  if (document.getElementById('layer-roads').checked)
    drawLayer(rawRoads, rgb.r, rgb.g, rgb.b, strokeW);
  if (document.getElementById('layer-rivers').checked)
    drawLayer(rawRivers, 60, 130, 220, strokeW * 1.5);
  if (document.getElementById('layer-coast').checked)
    drawLayer(rawCoast, 30, 170, 200, strokeW * 2);
}

// ── Overpass fetch ─────────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function overpassFetch(query) {
  var res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST', body: 'data=' + encodeURIComponent(query)
  });
  var text = await res.text();
  if (text.trim().startsWith('<')) {
    await new Promise(function(r){setTimeout(r,3000);});
    var res2 = await fetch('https://overpass-api.de/api/interpreter', {
      method: 'POST', body: 'data=' + encodeURIComponent(query)
    });
    text = await res2.text();
  }
  try { return JSON.parse(text).elements || []; }
  catch(e) { return []; }
}

async function geocode(q) {
  var res = await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1', { headers:{'Accept-Language':'en'} });
  var data = await res.json();
  if (!data.length) throw new Error('Location not found');
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon) };
}

function parseRoads(elements) {
  var roads = [], minLat=Infinity, maxLat=-Infinity, minLon=Infinity, maxLon=-Infinity;
  elements.forEach(function(el) {
    if (!el.geometry) return;
    var pts = el.geometry.map(function(g){ return [g.lat, g.lon]; });
    roads.push(pts);
    pts.forEach(function(p){
      if(p[0]<minLat)minLat=p[0]; if(p[0]>maxLat)maxLat=p[0];
      if(p[1]<minLon)minLon=p[1]; if(p[1]>maxLon)maxLon=p[1];
    });
  });
  return { roads, bounds: { minLat, maxLat, minLon, maxLon } };
}

document.getElementById('btn-load').addEventListener('click', loadLocation);
document.getElementById('loc-input').addEventListener('keydown', function(e){ if(e.key==='Enter') loadLocation(); });

async function loadLocation() {
  var q = document.getElementById('loc-input').value.trim();
  if (!q) return;
  setStatus('Searching…');
  try {
    var loc = await geocode(q);
    setStatus('Loading…');
    var delta = 0.012;
    var bbox = (loc.lat-delta)+','+(loc.lon-delta)+','+(loc.lat+delta)+','+(loc.lon+delta);
    var [roadEls, riverEls, coastEls] = await Promise.all([
      overpassFetch('[out:json][timeout:25];(way["highway"~"^(primary|secondary|tertiary|residential|unclassified|trunk|motorway|pedestrian|living_street)$"]('+bbox+'););out geom;'),
      overpassFetch('[out:json][timeout:25];(way["waterway"~"^(river|stream|canal|drain)$"]('+bbox+'););out geom;'),
      overpassFetch('[out:json][timeout:25];(way["natural"="coastline"]('+bbox+');way["natural"~"^(water|bay)$"]('+bbox+'););out geom;')
    ]);
    var all = parseRoads([...roadEls, ...riverEls, ...coastEls]);
    rawRoads = parseRoads(roadEls).roads;
    rawRivers = parseRoads(riverEls).roads;
    rawCoast = parseRoads(coastEls).roads;
    roadsBounds = all.bounds.minLat === Infinity ? null : all.bounds;
    if (!roadsBounds) { setStatus('No data found.'); return; }
    setStatus('Roads: '+rawRoads.length+' · Rivers: '+rawRivers.length+' · Coast: '+rawCoast.length);
    render();
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

// ── Controls ───────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  return { r: parseInt(hex.slice(1,3),16), g: parseInt(hex.slice(3,5),16), b: parseInt(hex.slice(5,7),16) };
}

document.getElementById('fold-angle').addEventListener('input', function() {
  document.getElementById('fold-val').textContent = this.value + '°';
});
document.getElementById('stroke-w').addEventListener('input', function() {
  document.getElementById('stroke-val').textContent = this.value;
  render();
});
document.getElementById('line-opacity').addEventListener('input', function() {
  document.getElementById('opacity-val').textContent = this.value + '%';
  render();
});
document.getElementById('show-grid').addEventListener('change', render);
document.getElementById('paper-color').addEventListener('input', render);
document.getElementById('line-color').addEventListener('input', render);
document.getElementById('layer-roads').addEventListener('change', render);
document.getElementById('layer-rivers').addEventListener('change', render);
document.getElementById('layer-coast').addEventListener('change', render);

document.getElementById('btn-undo').addEventListener('click', function() {
  creases.pop();
  render();
});
document.getElementById('btn-clear').addEventListener('click', function() {
  creases = [];
  render();
});

// Step switching
document.getElementById('btn-to-step2').addEventListener('click', function() {
  currentStep = 2;
  document.getElementById('step1-panel').style.display = 'none';
  document.getElementById('step2-panel').style.display = 'block';
  document.getElementById('step1-ind').className = 'step done';
  document.getElementById('step2-ind').className = 'step active';
  render();
});
document.getElementById('btn-back').addEventListener('click', function() {
  currentStep = 1;
  document.getElementById('step1-panel').style.display = 'block';
  document.getElementById('step2-panel').style.display = 'none';
  document.getElementById('step1-ind').className = 'step active';
  document.getElementById('step2-ind').className = 'step';
  render();
});

// ── Export ─────────────────────────────────────────────────────────────────
document.getElementById('btn-export-png').addEventListener('click', function() {
  var link = document.createElement('a');
  link.download = 'mapfold.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

document.getElementById('btn-export-svg').addEventListener('click', function() {
  if (!roadsBounds) return;
  var lineColor = document.getElementById('line-color').value;
  var strokeW = parseFloat(document.getElementById('stroke-w').value);
  var opacity = parseInt(document.getElementById('line-opacity').value) / 100;
  var rgb = hexToRgb(lineColor);
  var paths = [];

  function svgLayer(roads, r, g, b, sw) {
    roads.forEach(function(road) {
      if (road.length < 2) return;
      var d = '';
      for (var i = 0; i < road.length; i++) {
        var p = normalizePt(road[i][0], road[i][1], roadsBounds);
        var f = applyFolds(p.x, p.y);
        d += (i===0?'M':'L')+f.x.toFixed(2)+' '+f.y.toFixed(2);
      }
      paths.push('<path d="'+d+'" stroke="rgb('+r+','+g+','+b+')" stroke-opacity="'+opacity+'" stroke-width="'+sw+'" fill="none" stroke-linecap="round"/>');
    });
  }

  if (document.getElementById('layer-roads').checked) svgLayer(rawRoads, rgb.r, rgb.g, rgb.b, strokeW);
  if (document.getElementById('layer-rivers').checked) svgLayer(rawRivers, 60, 130, 220, strokeW*1.5);
  if (document.getElementById('layer-coast').checked) svgLayer(rawCoast, 30, 170, 200, strokeW*2);

  var paperColor = document.getElementById('paper-color').value;
  var svg = '<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">\n<rect width="'+W+'" height="'+H+'" fill="'+paperColor+'"/>\n'+paths.join('\n')+'\n</svg>';
  var blob = new Blob([svg],{type:'image/svg+xml'});
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.download = 'mapfold.svg'; a.href = url; a.click();
  URL.revokeObjectURL(url);
});

// Initial render
render();
</script>
</body>
</html>

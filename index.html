<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Map Fold</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--panel:#181818;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;--accent:#fff}
body{background:var(--bg);color:var(--text);font-family:'Outfit','Helvetica Neue',sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden}
#panel{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:12px}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
canvas{display:block}
.section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.row label{flex:1;font-size:11px;color:var(--muted)}
input[type=text],input[type=number]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:12px;outline:none;width:100%}
input[type=range]{flex:1;accent-color:var(--accent)}
input[type=color]{width:36px;height:26px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0}
.btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;transition:border-color .15s}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:#ddd}
#status{font-size:11px;color:var(--muted);min-height:16px}
.val-label{font-size:11px;color:var(--text);width:28px;text-align:right}
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="panel">
  <div>
    <div class="section-title">Location</div>
    <div class="row" style="gap:6px">
      <input type="text" id="loc-input" placeholder="e.g. Tokyo, New York, 上海" style="flex:1"/>
      <button class="btn btn-primary" id="btn-load">→</button>
    </div>
    <div id="status">Enter a location to begin</div>
  </div>

  <div>
    <div class="section-title">Layers</div>
    <div class="row"><label>Roads</label><input type="checkbox" id="layer-roads" checked/></div>
    <div class="row"><label>Rivers</label><input type="checkbox" id="layer-rivers" checked/></div>
    <div class="row"><label>Coastline</label><input type="checkbox" id="layer-coast" checked/></div>
  </div>

  <div>
    <div class="section-title">Fold</div>
    <div class="row">
      <label>Segments</label>
      <input type="range" id="seg-count" min="3" max="24" value="8" step="1"/>
      <span class="val-label" id="seg-val">8</span>
    </div>
    <div class="row">
      <label>Fold angle</label>
      <input type="range" id="fold-angle" min="0" max="180" value="45" step="1"/>
      <span class="val-label" id="fold-val">45°</span>
    </div>
    <div class="row">
      <label>Fold radius</label>
      <input type="range" id="fold-radius" min="20" max="100" value="65" step="1"/>
      <span class="val-label" id="radius-val">65%</span>
    </div>
    <div class="row">
      <label>Alternating</label>
      <input type="checkbox" id="alternating" checked/>
    </div>
  </div>

  <div>
    <div class="section-title">Style</div>
    <div class="row">
      <label>Line color</label>
      <input type="color" id="line-color" value="#ffffff"/>
    </div>
    <div class="row">
      <label>BG color</label>
      <input type="color" id="bg-color" value="#0e0e0e"/>
    </div>
    <div class="row">
      <label>Stroke width</label>
      <input type="range" id="stroke-w" min="1" max="6" value="2" step="0.5"/>
      <span class="val-label" id="stroke-val">2</span>
    </div>
    <div class="row">
      <label>Opacity</label>
      <input type="range" id="line-opacity" min="10" max="100" value="70" step="5"/>
      <span class="val-label" id="opacity-val">70%</span>
    </div>
  </div>

  <div>
    <div class="section-title">Export</div>
    <div style="display:flex;gap:8px">
      <button class="btn" id="btn-export-png" style="flex:1">PNG</button>
      <button class="btn" id="btn-export-svg" style="flex:1">SVG</button>
    </div>
  </div>
</div>

<div id="canvas-area">
  <canvas id="main-canvas" width="720" height="720"></canvas>
</div>

<script>
var W = 720, H = 720;
var canvas = document.getElementById('main-canvas');
var ctx = canvas.getContext('2d');
var rawRoads = [];
var rawRivers = [];
var rawCoast = [];
var roadsBounds = null;

// ── Overpass API fetch ─────────────────────────────────────────────────────
function setStatus(msg) { document.getElementById('status').textContent = msg; }

async function geocode(query) {
  var url = 'https://nominatim.openstreetmap.org/search?q=' + encodeURIComponent(query) + '&format=json&limit=1';
  var res = await fetch(url, { headers: { 'Accept-Language': 'en' } });
  var data = await res.json();
  if (!data.length) throw new Error('Location not found');
  return { lat: parseFloat(data[0].lat), lon: parseFloat(data[0].lon), display: data[0].display_name };
}

async function fetchRoads(lat, lon) {
  var delta = 0.012; // ~1.3km radius
  var bbox = (lat-delta)+','+(lon-delta)+','+(lat+delta)+','+(lon+delta);
  var query = '[out:json][timeout:15];(way["highway"~"^(primary|secondary|tertiary|residential|unclassified|trunk|motorway|pedestrian|footway|path|cycleway|living_street)$"]('+bbox+'););out geom;';
  var res = await fetch('https://overpass-api.de/api/interpreter', {
    method: 'POST',
    body: 'data=' + encodeURIComponent(query)
  });
  var data = await res.json();
  return data.elements || [];
}


async function fetchRivers(lat, lon) {
  var delta = 0.012;
  var bbox = (lat-delta)+','+(lon-delta)+','+(lat+delta)+','+(lon+delta);
  var query = '[out:json][timeout:15];(way["waterway"~"^(river|stream|canal|drain)$"]('+bbox+'););out geom;';
  var res = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(query) });
  var data = await res.json();
  return data.elements || [];
}

async function fetchCoast(lat, lon) {
  var delta = 0.012;
  var bbox = (lat-delta)+','+(lon-delta)+','+(lat+delta)+','+(lon+delta);
  var query = '[out:json][timeout:15];(way["natural"="coastline"]('+bbox+');way["natural"~"^(water|bay)$"]('+bbox+'););out geom;';
  var res = await fetch('https://overpass-api.de/api/interpreter', { method:'POST', body:'data='+encodeURIComponent(query) });
  var data = await res.json();
  return data.elements || [];
}

function parseRoads(elements) {
  var roads = [];
  var minLat=Infinity,maxLat=-Infinity,minLon=Infinity,maxLon=-Infinity;
  elements.forEach(function(el) {
    if (!el.geometry) return;
    var pts = el.geometry.map(function(g){ return [g.lat, g.lon]; });
    roads.push(pts);
    pts.forEach(function(p){
      if(p[0]<minLat)minLat=p[0]; if(p[0]>maxLat)maxLat=p[0];
      if(p[1]<minLon)minLon=p[1]; if(p[1]>maxLon)maxLon=p[1];
    });
  });
  return { roads: roads, bounds: { minLat, maxLat, minLon, maxLon } };
}

// ── Coordinate mapping ─────────────────────────────────────────────────────
// Map lat/lon to canvas [-1, 1] normalized coords (center = 0,0)
function normalizePt(lat, lon, bounds) {
  var cx = (bounds.minLon + bounds.maxLon) / 2;
  var cy = (bounds.minLat + bounds.maxLat) / 2;
  var span = Math.max(bounds.maxLat - bounds.minLat, bounds.maxLon - bounds.minLon);
  return {
    x: (lon - cx) / span,
    y: -(lat - cy) / span
  };
}

// Convert normalized [-1,1] to canvas pixel
function toCanvas(nx, ny) {
  var r = Math.min(W, H) * 0.46;
  return { x: W/2 + nx * r * 2, y: H/2 + ny * r * 2 };
}

// ── Polar fold transform ──────────────────────────────────────────────────
// The core: take a point in normalized space, apply circular segment fold
function foldPoint(nx, ny, nSegments, foldAngleDeg, foldRadiusFrac, alternating) {
  var angle = foldAngleDeg * Math.PI / 180;
  var foldR = foldRadiusFrac / 100;

  var r = Math.sqrt(nx*nx + ny*ny);
  var theta = Math.atan2(ny, nx); // -PI to PI
  if (theta < 0) theta += Math.PI * 2; // 0 to 2PI

  // Which segment does this point fall in?
  var segAngle = (Math.PI * 2) / nSegments;
  var segIdx = Math.floor(theta / segAngle);
  var thetaInSeg = theta - segIdx * segAngle; // 0 to segAngle

  // For alternating: even segments fold up, odd fold down (or skip)
  var doFold = alternating ? (segIdx % 2 === 0) : true;

  if (!doFold || r < 0.001) return { x: nx, y: ny, z: 0, alpha: 1 };

  // Fold: rotate the point within its segment around the fold radius line
  // Think of it as: the part of the segment beyond foldR gets lifted by angle degrees
  if (r > foldR) {
    // This part gets folded
    var foldedR = foldR + (r - foldR) * Math.cos(angle);
    var z = (r - foldR) * Math.sin(angle); // height above plane
    var newTheta = segIdx * segAngle + thetaInSeg;
    return {
      x: foldedR * Math.cos(newTheta),
      y: foldedR * Math.sin(newTheta),
      z: z,
      alpha: 0.4 + 0.6 * Math.cos(angle * 0.5)
    };
  }

  return { x: nx, y: ny, z: 0, alpha: 1 };
}

// ── Render ─────────────────────────────────────────────────────────────────
function hexToRgb(hex) {
  var r = parseInt(hex.slice(1,3),16);
  var g = parseInt(hex.slice(3,5),16);
  var b = parseInt(hex.slice(5,7),16);
  return {r,g,b};
}

function render() {
  var nSeg = parseInt(document.getElementById('seg-count').value);
  var foldAngle = parseInt(document.getElementById('fold-angle').value);
  var foldRadius = parseInt(document.getElementById('fold-radius').value);
  var alternating = document.getElementById('alternating').checked;
  var lineColor = document.getElementById('line-color').value;
  var bgColor = document.getElementById('bg-color').value;
  var strokeW = parseFloat(document.getElementById('stroke-w').value);
  var opacity = parseInt(document.getElementById('line-opacity').value) / 100;
  var rgb = hexToRgb(lineColor);

  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  if (!rawRoads.length || !roadsBounds) return;

  // Draw segment dividers (subtle)
  ctx.save();
  var segAngle = (Math.PI * 2) / nSeg;
  var rMax = Math.min(W,H) * 0.46;
  ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.12)';
  ctx.lineWidth = 0.5;
  for (var i=0; i<nSeg; i++) {
    var a = i * segAngle;
    ctx.beginPath();
    ctx.moveTo(W/2, H/2);
    ctx.lineTo(W/2 + Math.cos(a)*rMax, H/2 + Math.sin(a)*rMax);
    ctx.stroke();
  }
  // Fold radius circle
  ctx.beginPath();
  ctx.arc(W/2, H/2, rMax * foldRadius/100 * 0.5, 0, Math.PI*2);
  ctx.strokeStyle = 'rgba('+rgb.r+','+rgb.g+','+rgb.b+',0.08)';
  ctx.stroke();
  ctx.restore();

  function drawLayer(roads, r, g, b, sw, op) {
    roads.forEach(function(road) {
      if (road.length < 2) return;
      ctx.beginPath();
      var started = false;
      for (var i=0; i<road.length; i++) {
        var n = normalizePt(road[i][0], road[i][1], roadsBounds);
        var f = foldPoint(n.x, n.y, nSeg, foldAngle, foldRadius, alternating);
        var cp = toCanvas(f.x, f.y);
        if (!started) { ctx.moveTo(cp.x, cp.y); started = true; }
        else ctx.lineTo(cp.x, cp.y);
      }
      ctx.strokeStyle = 'rgba('+r+','+g+','+b+','+op+')';
      ctx.lineWidth = sw;
      ctx.lineJoin = 'round';
      ctx.lineCap = 'round';
      ctx.stroke();
    });
  }

  if (document.getElementById('layer-roads').checked)
    drawLayer(rawRoads, rgb.r, rgb.g, rgb.b, strokeW, opacity * 0.6);
  if (document.getElementById('layer-rivers').checked)
    drawLayer(rawRivers, 80, 160, 255, strokeW * 1.4, opacity);
  if (document.getElementById('layer-coast').checked)
    drawLayer(rawCoast, 40, 200, 220, strokeW * 1.8, opacity);
}

// ── Controls ───────────────────────────────────────────────────────────────
function bindSlider(id, valId, suffix, cb) {
  var el = document.getElementById(id);
  var vl = document.getElementById(valId);
  el.addEventListener('input', function() {
    vl.textContent = el.value + (suffix||'');
    if (cb) cb();
    render();
  });
}
bindSlider('seg-count','seg-val','');
bindSlider('fold-angle','fold-val','°');
bindSlider('fold-radius','radius-val','%');
bindSlider('stroke-w','stroke-val','');
bindSlider('line-opacity','opacity-val','%');
document.getElementById('alternating').addEventListener('change', render);
document.getElementById('line-color').addEventListener('input', render);
document.getElementById('bg-color').addEventListener('input', render);

// ── Load ───────────────────────────────────────────────────────────────────
document.getElementById('btn-load').addEventListener('click', loadLocation);
document.getElementById('loc-input').addEventListener('keydown', function(e){ if(e.key==='Enter') loadLocation(); });

async function loadLocation() {
  var q = document.getElementById('loc-input').value.trim();
  if (!q) return;
  setStatus('Searching…');
  try {
    var loc = await geocode(q);
    setStatus('Loading roads for ' + loc.display.split(',')[0] + '…');
    setStatus('Loading layers…');
    var [roadEls, riverEls, coastEls] = await Promise.all([
      fetchRoads(loc.lat, loc.lon),
      fetchRivers(loc.lat, loc.lon),
      fetchCoast(loc.lat, loc.lon)
    ]);
    var parsed = parseRoads([...roadEls, ...riverEls, ...coastEls]);
    var roadParsed = parseRoads(roadEls);
    var riverParsed = parseRoads(riverEls);
    var coastParsed = parseRoads(coastEls);
    rawRoads = roadParsed.roads;
    rawRivers = riverParsed.roads;
    rawCoast = coastParsed.roads;
    roadsBounds = parsed.bounds.minLat === Infinity ? (roadParsed.bounds.minLat !== Infinity ? roadParsed.bounds : null) : parsed.bounds;
    if (!roadsBounds || roadsBounds.minLat === Infinity) { setStatus('No data found. Try a city center.'); return; }
    setStatus('Roads: '+rawRoads.length+' · Rivers: '+rawRivers.length+' · Coast: '+rawCoast.length);
    render();
  } catch(e) {
    setStatus('Error: ' + e.message);
  }
}

// ── Export ─────────────────────────────────────────────────────────────────
document.getElementById('btn-export-png').addEventListener('click', function() {
  var link = document.createElement('a');
  link.download = 'mapfold.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

document.getElementById('btn-export-svg').addEventListener('click', function() {
  // Build SVG from current state
  var nSeg = parseInt(document.getElementById('seg-count').value);
  var foldAngle = parseInt(document.getElementById('fold-angle').value);
  var foldRadius = parseInt(document.getElementById('fold-radius').value);
  var alternating = document.getElementById('alternating').checked;
  var lineColor = document.getElementById('line-color').value;
  var bgColor = document.getElementById('bg-color').value;
  var strokeW = parseFloat(document.getElementById('stroke-w').value);
  var opacity = parseInt(document.getElementById('line-opacity').value) / 100;

  var paths = [];
  function svgLayer(roads, color, sw, op) {
    roads.forEach(function(road) {
      if (road.length < 2) return;
      var d = '';
      for (var i=0; i<road.length; i++) {
        var n = normalizePt(road[i][0], road[i][1], roadsBounds);
        var f = foldPoint(n.x, n.y, nSeg, foldAngle, foldRadius, alternating);
        var cp = toCanvas(f.x, f.y);
        d += (i===0 ? 'M' : 'L') + cp.x.toFixed(2)+' '+cp.y.toFixed(2);
      }
      paths.push('<path d="'+d+'" stroke="'+color+'" stroke-opacity="'+op+'" stroke-width="'+sw+'" fill="none" stroke-linecap="round" stroke-linejoin="round"/>');
    });
  }
  if (document.getElementById('layer-roads').checked) svgLayer(rawRoads, lineColor, strokeW, opacity*0.6);
  if (document.getElementById('layer-rivers').checked) svgLayer(rawRivers, '#50a0ff', strokeW*1.4, opacity);
  if (document.getElementById('layer-coast').checked) svgLayer(rawCoast, '#28c8dc', strokeW*1.8, opacity);

  var svg = '<?xml version="1.0" encoding="UTF-8"?>\n'+
    '<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">\n'+
    '<rect width="'+W+'" height="'+H+'" fill="'+bgColor+'"/>\n'+
    paths.join('\n')+'\n</svg>';

  var blob = new Blob([svg], {type:'image/svg+xml'});
  var url = URL.createObjectURL(blob);
  var link = document.createElement('a');
  link.download = 'mapfold.svg';
  link.href = url;
  link.click();
  URL.revokeObjectURL(url);
});

// Initial render (empty)
render();
</script>
</body>
</html>

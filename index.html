<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Map Fold</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0e0e0e;--panel:#181818;--border:#2a2a2a;--text:#e8e8e8;--muted:#666;--accent:#fff}
body{background:var(--bg);color:var(--text);font-family:'Outfit','Helvetica Neue',sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden}
#panel{width:260px;min-width:260px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:16px;gap:12px}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
canvas{display:block}
.section-title{font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);margin-bottom:8px}
.row{display:flex;gap:8px;align-items:center;margin-bottom:6px}
.row label{flex:1;font-size:11px;color:var(--muted)}
input[type=text]{background:var(--bg);border:1px solid var(--border);color:var(--text);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:12px;outline:none;width:100%}
input[type=range]{flex:1;accent-color:var(--accent)}
input[type=color]{width:36px;height:26px;border:none;border-radius:4px;cursor:pointer;background:none;padding:0}
.btn{background:transparent;border:1px solid var(--border);color:var(--text);border-radius:6px;padding:7px 14px;font-family:inherit;font-size:12px;cursor:pointer;transition:border-color .15s;width:100%}
.btn:hover{border-color:var(--accent)}
.btn-primary{background:var(--accent);color:#000;border-color:var(--accent)}
.btn-primary:hover{background:#ddd}
.val-label{font-size:11px;color:var(--text);width:32px;text-align:right}
#status{font-size:11px;color:var(--muted);min-height:16px}
.btn-group{display:flex;gap:6px}
.btn-group .btn{flex:1;padding:5px 8px;font-size:11px}
.btn-group .btn.active{background:var(--accent);color:#000;border-color:var(--accent)}
</style>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500&display=swap" rel="stylesheet"/>
</head>
<body>
<div id="panel">

  <div>
    <div class="section-title">View</div>
    <div class="btn-group">
      <button class="btn active" id="view-top">Top</button>
      <button class="btn" id="view-iso">Isometric 45°</button>
    </div>
  </div>

  <div>
    <div class="section-title">Herringbone Fold</div>
    <div class="row">
      <label>Cell size</label>
      <input type="range" id="cell-size" min="30" max="180" value="80" step="5"/>
      <span class="val-label" id="cell-val">80</span>
    </div>
    <div class="row">
      <label>Fold depth</label>
      <input type="range" id="fold-depth" min="0" max="100" value="55" step="1"/>
      <span class="val-label" id="depth-val">55</span>
    </div>
    <div class="row">
      <label>Skew angle</label>
      <input type="range" id="skew-angle" min="10" max="80" value="35" step="1"/>
      <span class="val-label" id="skew-val">35°</span>
    </div>
    <div class="row">
      <label>Light angle</label>
      <input type="range" id="light-angle" min="0" max="360" value="45" step="5"/>
      <span class="val-label" id="light-val">45°</span>
    </div>
  </div>

  <div>
    <div class="section-title">Paper</div>
    <div class="row">
      <label>Color</label>
      <input type="color" id="paper-color" value="#f0ece4"/>
    </div>
    <div class="row">
      <label>Shadow</label>
      <input type="range" id="shadow-strength" min="0" max="100" value="60" step="5"/>
      <span class="val-label" id="shadow-val">60</span>
    </div>
    <div class="row">
      <label>Show grid</label>
      <input type="checkbox" id="show-grid" checked/>
    </div>
  </div>

  <div>
    <div class="section-title">Map Data</div>
    <div class="row" style="gap:6px">
      <input type="text" id="loc-input" placeholder="Tokyo, London, 上海…" style="flex:1"/>
      <button class="btn btn-primary" id="btn-load" style="width:auto;padding:5px 12px">→</button>
    </div>
    <div id="status">Enter a location</div>
    <div class="row" style="margin-top:6px"><label>Roads</label><input type="checkbox" id="layer-roads" checked/></div>
    <div class="row"><label>Rivers</label><input type="checkbox" id="layer-rivers" checked/></div>
    <div class="row"><label>Coastline</label><input type="checkbox" id="layer-coast" checked/></div>
    <div class="row">
      <label>Map zoom</label>
      <input type="range" id="map-zoom" min="50" max="300" value="100" step="5"/>
      <span class="val-label" id="zoom-val">100%</span>
    </div>
    <div class="row">
      <label>Line color</label>
      <input type="color" id="line-color" value="#2a1a0e"/>
    </div>
    <div class="row">
      <label>Line width</label>
      <input type="range" id="stroke-w" min="0.5" max="4" value="1" step="0.5"/>
      <span class="val-label" id="stroke-val">1</span>
    </div>
    <div class="row">
      <label>Opacity</label>
      <input type="range" id="line-opacity" min="10" max="100" value="75" step="5"/>
      <span class="val-label" id="opacity-val">75%</span>
    </div>
  </div>

  <div>
    <div class="section-title">Export</div>
    <div class="btn-group">
      <button class="btn" id="btn-export-png">PNG</button>
      <button class="btn" id="btn-export-svg">SVG</button>
    </div>
  </div>

</div>
<div id="canvas-area">
  <canvas id="main-canvas" width="720" height="720"></canvas>
</div>

<script>
var W = 720, H = 720;
var canvas = document.getElementById('main-canvas');
var ctx = canvas.getContext('2d');
var currentView = 'top';
var rawRoads = [], rawRivers = [], rawCoast = [];
var roadsBounds = null;

function getParams() {
  return {
    cellSize:    parseInt(document.getElementById('cell-size').value),
    foldDepth:   parseInt(document.getElementById('fold-depth').value) / 100,
    skewAngle:   parseInt(document.getElementById('skew-angle').value) * Math.PI / 180,
    lightAngle:  parseInt(document.getElementById('light-angle').value) * Math.PI / 180,
    shadowStr:   parseInt(document.getElementById('shadow-strength').value) / 100,
    paperColor:  document.getElementById('paper-color').value,
    showGrid:    document.getElementById('show-grid').checked,
    mapZoom:     parseFloat(document.getElementById('map-zoom').value) / 100,
    lineColor:   document.getElementById('line-color').value,
    strokeW:     parseFloat(document.getElementById('stroke-w').value),
    lineOpacity: parseInt(document.getElementById('line-opacity').value) / 100,
    showRoads:   document.getElementById('layer-roads').checked,
    showRivers:  document.getElementById('layer-rivers').checked,
    showCoast:   document.getElementById('layer-coast').checked,
  };
}

// ── Herringbone mesh ───────────────────────────────────────────────────────
function buildMesh(p) {
  var cs = p.cellSize;
  var sk = p.skewAngle;
  var hw = cs * Math.cos(sk);
  var hh = cs * Math.sin(sk);
  var depth = p.foldDepth * cs * 0.5;

  var cols = Math.ceil(W / (hw * 2)) + 4;
  var rows = Math.ceil(H / (hh * 2)) + 4;
  var offX = Math.floor(cols / 2) * hw * 2;
  var offY = Math.floor(rows / 2) * hh * 2;
  var cells = [];

  for (var row = -2; row < rows; row++) {
    for (var col = -2; col < cols; col++) {
      var ox = col * hw * 2 + (((row % 2) + 2) % 2) * hw + W/2 - offX;
      var oy = row * hh * 2 + H/2 - offY;
      var sign = (((row + col) % 2) + 2) % 2 === 0 ? 1 : -1;

      var vT = { x: ox,      y: oy - hh, z:  sign * depth };
      var vR = { x: ox + hw, y: oy,      z: -sign * depth };
      var vB = { x: ox,      y: oy + hh, z:  sign * depth };
      var vL = { x: ox - hw, y: oy,      z: -sign * depth };
      var vC = { x: ox,      y: oy,      z: 0 };

      cells.push({
        ox: ox, oy: oy, hw: hw, hh: hh, sign: sign, depth: depth,
        vT: vT, vR: vR, vB: vB, vL: vL, vC: vC,
        faces: [
          { verts: [vT, vL, vC] },
          { verts: [vT, vR, vC] },
          { verts: [vB, vR, vC] },
          { verts: [vB, vL, vC] },
        ]
      });
    }
  }
  return { cells: cells, hw: hw, hh: hh, cols: cols, rows: rows, offX: offX, offY: offY };
}

// ── Projection ─────────────────────────────────────────────────────────────
function project(v) {
  if (currentView === 'top') {
    return { x: v.x, y: v.y - v.z * 0.2 };
  } else {
    var a = Math.PI / 4;
    return {
      x: v.x + v.z * Math.cos(a) * 0.65,
      y: v.y - v.z * (Math.sin(a) * 0.65 + 0.4)
    };
  }
}

function faceBrightness(va, vb, vc, lightAngle, shadowStr) {
  var ax=vb.x-va.x, ay=vb.y-va.y, az=vb.z-va.z;
  var bx=vc.x-va.x, by=vc.y-va.y, bz=vc.z-va.z;
  var nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
  var nl=Math.sqrt(nx*nx+ny*ny+nz*nz); if(nl<0.001) return 1;
  nx/=nl; ny/=nl; nz/=nl;
  var lx=Math.cos(lightAngle), ly=Math.sin(lightAngle), lz=0.7;
  var ll=Math.sqrt(lx*lx+ly*ly+lz*lz); lx/=ll; ly/=ll; lz/=ll;
  var dot=nx*lx+ny*ly+nz*lz;
  return Math.max(0.1, Math.min(1.0, 0.5 + dot * 0.5 * shadowStr + (1-shadowStr)*0.5));
}

function hexToRgb(hex) {
  return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
}
function brightenHex(hex, t) {
  var c=hexToRgb(hex);
  return 'rgb('+Math.round(c.r*t)+','+Math.round(c.g*t)+','+Math.round(c.b*t)+')';
}

// ── Map fold lookup ────────────────────────────────────────────────────────
// Given flat canvas point, find its 3D z based on herringbone mesh
function flatToFold(fx, fy, mesh) {
  var hw = mesh.hw, hh = mesh.hh;
  // Find nearest cell
  var rowF = (fy - H/2 + mesh.offY) / (hh * 2);
  var row = Math.round(rowF);
  var colF = (fx - W/2 + mesh.offX - (((row%2)+2)%2) * hw) / (hw * 2);
  var col = Math.round(colF);

  var bestZ = 0, bestDist = Infinity;
  for (var dr = -1; dr <= 1; dr++) {
    for (var dc = -1; dc <= 1; dc++) {
      var r = row+dr, c = col+dc;
      var ox = c*hw*2 + (((r%2)+2)%2)*hw + W/2 - mesh.offX;
      var oy = r*hh*2 + H/2 - mesh.offY;
      var dx = fx - ox, dy = fy - oy;
      var dist = Math.abs(dx)/hw + Math.abs(dy)/hh;
      if (dist < bestDist) {
        bestDist = dist;
        var sign = (((r+c)%2)+2)%2===0 ? 1 : -1;
        // Interpolate z: top/bottom ridge = sign*depth, left/right = -sign*depth
        var tx = Math.abs(dx)/hw, ty = Math.abs(dy)/hh;
        var depth = mesh.cells[0] ? mesh.cells[0].depth : 0;
        var zRidge = (ty > tx) ? sign*depth : -sign*depth;
        var t = Math.max(tx, ty);
        bestZ = zRidge * t * (dy < 0 ? 1 : -1) * (ty > tx ? 1 : 1);
        // Simpler: use quadrant
        var qy = dy < 0 ? -1 : 1;
        var qx = dx < 0 ? -1 : 1;
        var zT = sign * depth;    // top/bottom vertex
        var zS = -sign * depth;   // left/right vertex
        var zC = 0;
        // Bilinear from corner vertices
        var ax2 = Math.abs(dx)/hw, ay2 = Math.abs(dy)/hh;
        bestZ = (zT * ay2 + zS * ax2 + zC * (1 - ax2 - ay2));
      }
    }
  }
  return { x: fx, y: fy, z: bestZ };
}

// ── Render ─────────────────────────────────────────────────────────────────
var lastMesh = null;

function render() {
  var p = getParams();
  var mesh = buildMesh(p);
  lastMesh = mesh;

  ctx.fillStyle = '#0e0e0e';
  ctx.fillRect(0, 0, W, H);

  mesh.cells.forEach(function(cell) {
    cell.faces.forEach(function(face) {
      var p0=project(face.verts[0]), p1=project(face.verts[1]), p2=project(face.verts[2]);
      var br = faceBrightness(face.verts[0],face.verts[1],face.verts[2],p.lightAngle,p.shadowStr);
      ctx.beginPath();
      ctx.moveTo(p0.x,p0.y); ctx.lineTo(p1.x,p1.y); ctx.lineTo(p2.x,p2.y);
      ctx.closePath();
      ctx.fillStyle = brightenHex(p.paperColor, br);
      ctx.fill();
    });

    if (p.showGrid) {
      var verts = [cell.vT, cell.vR, cell.vB, cell.vL];
      ctx.beginPath();
      var first = project(verts[0]);
      ctx.moveTo(first.x, first.y);
      for (var i=1; i<verts.length; i++) { var pp=project(verts[i]); ctx.lineTo(pp.x,pp.y); }
      ctx.closePath();
      var pT=project(cell.vT), pB=project(cell.vB), pL=project(cell.vL), pR=project(cell.vR);
      ctx.moveTo(pT.x,pT.y); ctx.lineTo(pB.x,pB.y);
      ctx.moveTo(pL.x,pL.y); ctx.lineTo(pR.x,pR.y);
      ctx.strokeStyle='rgba(0,0,0,0.2)';
      ctx.lineWidth=0.5;
      ctx.stroke();
    }
  });

  if (roadsBounds) drawMapLayers(p, mesh);
}

// ── Map layers ─────────────────────────────────────────────────────────────
function normToCanvas(lat, lon, bounds, zoom) {
  var cx=(bounds.minLon+bounds.maxLon)/2, cy=(bounds.minLat+bounds.maxLat)/2;
  var span=Math.max(bounds.maxLat-bounds.minLat, bounds.maxLon-bounds.minLon);
  return { x: W/2+(lon-cx)/span*W*zoom, y: H/2-(lat-cy)/span*H*zoom };
}

function drawMapLayers(p, mesh) {
  var rgb = hexToRgb(p.lineColor);
  var maxJump = p.cellSize * 1.5;

  function drawLayer(roads, r, g, b, sw) {
    roads.forEach(function(road) {
      if (road.length < 2) return;
      for (var i=0; i<road.length-1; i++) {
        var f0 = normToCanvas(road[i][0],road[i][1],roadsBounds,p.mapZoom);
        var f1 = normToCanvas(road[i+1][0],road[i+1][1],roadsBounds,p.mapZoom);
        var v0 = flatToFold(f0.x, f0.y, mesh);
        var v1 = flatToFold(f1.x, f1.y, mesh);
        var pp0 = project(v0), pp1 = project(v1);
        var dx=pp1.x-pp0.x, dy=pp1.y-pp0.y;
        if (Math.sqrt(dx*dx+dy*dy) > maxJump) continue;
        ctx.beginPath();
        ctx.moveTo(pp0.x,pp0.y); ctx.lineTo(pp1.x,pp1.y);
        ctx.strokeStyle='rgba('+r+','+g+','+b+','+p.lineOpacity+')';
        ctx.lineWidth=sw; ctx.lineCap='round'; ctx.stroke();
      }
    });
  }

  if (p.showRoads)  drawLayer(rawRoads,  rgb.r,rgb.g,rgb.b, p.strokeW);
  if (p.showRivers) drawLayer(rawRivers, 60,130,220, p.strokeW*1.5);
  if (p.showCoast)  drawLayer(rawCoast,  30,170,200, p.strokeW*2);
}

// ── Overpass ───────────────────────────────────────────────────────────────
function setStatus(m){document.getElementById('status').textContent=m;}

async function overpassFetch(query) {
  var res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(query)});
  var text=await res.text();
  if(text.trim().startsWith('<')){
    await new Promise(function(r){setTimeout(r,3000);});
    res=await fetch('https://overpass-api.de/api/interpreter',{method:'POST',body:'data='+encodeURIComponent(query)});
    text=await res.text();
  }
  try{return JSON.parse(text).elements||[];}catch(e){return[];}
}
async function geocode(q){
  var res=await fetch('https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(q)+'&format=json&limit=1',{headers:{'Accept-Language':'en'}});
  var d=await res.json(); if(!d.length)throw new Error('Not found');
  return{lat:parseFloat(d[0].lat),lon:parseFloat(d[0].lon)};
}
function parseRoads(els){
  var roads=[],minLat=1e9,maxLat=-1e9,minLon=1e9,maxLon=-1e9;
  els.forEach(function(el){
    if(!el.geometry)return;
    var pts=el.geometry.map(function(g){return[g.lat,g.lon];});
    roads.push(pts);
    pts.forEach(function(p){if(p[0]<minLat)minLat=p[0];if(p[0]>maxLat)maxLat=p[0];if(p[1]<minLon)minLon=p[1];if(p[1]>maxLon)maxLon=p[1];});
  });
  return{roads,bounds:{minLat,maxLat,minLon,maxLon}};
}

document.getElementById('btn-load').addEventListener('click',loadLocation);
document.getElementById('loc-input').addEventListener('keydown',function(e){if(e.key==='Enter')loadLocation();});
async function loadLocation(){
  var q=document.getElementById('loc-input').value.trim(); if(!q)return;
  setStatus('Searching…');
  try{
    var loc=await geocode(q); setStatus('Loading…');
    var delta=0.012;
    var bbox=(loc.lat-delta)+','+(loc.lon-delta)+','+(loc.lat+delta)+','+(loc.lon+delta);
    var [roadEls,riverEls,coastEls]=await Promise.all([
      overpassFetch('[out:json][timeout:25];(way["highway"~"^(primary|secondary|tertiary|residential|unclassified|trunk|motorway|pedestrian|living_street)$"]('+bbox+'););out geom;'),
      overpassFetch('[out:json][timeout:25];(way["waterway"~"^(river|stream|canal|drain)$"]('+bbox+'););out geom;'),
      overpassFetch('[out:json][timeout:25];(way["natural"="coastline"]('+bbox+');way["natural"~"^(water|bay)$"]('+bbox+'););out geom;')
    ]);
    var all=parseRoads([...roadEls,...riverEls,...coastEls]);
    rawRoads=parseRoads(roadEls).roads; rawRivers=parseRoads(riverEls).roads; rawCoast=parseRoads(coastEls).roads;
    roadsBounds=all.bounds.minLat<1e9?all.bounds:null;
    if(!roadsBounds){setStatus('No data.');return;}
    setStatus('Roads:'+rawRoads.length+' · Rivers:'+rawRivers.length+' · Coast:'+rawCoast.length);
    render();
  }catch(e){setStatus('Error: '+e.message);}
}

// ── Controls ───────────────────────────────────────────────────────────────
function bindSlider(id,valId,suffix){
  var el=document.getElementById(id),vl=document.getElementById(valId);
  el.addEventListener('input',function(){vl.textContent=el.value+(suffix||'');render();});
}
bindSlider('cell-size','cell-val','');
bindSlider('fold-depth','depth-val','');
bindSlider('skew-angle','skew-val','°');
bindSlider('light-angle','light-val','°');
bindSlider('shadow-strength','shadow-val','');
bindSlider('map-zoom','zoom-val','%');
bindSlider('stroke-w','stroke-val','');
bindSlider('line-opacity','opacity-val','%');
['paper-color','line-color','show-grid','layer-roads','layer-rivers','layer-coast'].forEach(function(id){
  var el=document.getElementById(id);
  el.addEventListener('change',render); el.addEventListener('input',render);
});

document.getElementById('view-top').addEventListener('click',function(){
  currentView='top';
  document.getElementById('view-top').classList.add('active');
  document.getElementById('view-iso').classList.remove('active');
  render();
});
document.getElementById('view-iso').addEventListener('click',function(){
  currentView='iso';
  document.getElementById('view-iso').classList.add('active');
  document.getElementById('view-top').classList.remove('active');
  render();
});

// ── Export ─────────────────────────────────────────────────────────────────
document.getElementById('btn-export-png').addEventListener('click',function(){
  var a=document.createElement('a'); a.download='mapfold.png'; a.href=canvas.toDataURL('image/png'); a.click();
});
document.getElementById('btn-export-svg').addEventListener('click',function(){
  if(!lastMesh)return;
  var p=getParams(); var mesh=lastMesh;
  var parts=['<rect width="'+W+'" height="'+H+'" fill="#0e0e0e"/>'];
  mesh.cells.forEach(function(cell){
    cell.faces.forEach(function(face){
      var pp=face.verts.map(function(v){var q=project(v);return q.x.toFixed(1)+','+q.y.toFixed(1);});
      var br=faceBrightness(face.verts[0],face.verts[1],face.verts[2],p.lightAngle,p.shadowStr);
      var c=hexToRgb(p.paperColor);
      var fc='rgb('+Math.round(c.r*br)+','+Math.round(c.g*br)+','+Math.round(c.b*br)+')';
      parts.push('<polygon points="'+pp.join(' ')+'" fill="'+fc+'"/>');
    });
  });
  if(roadsBounds){
    var rgb=hexToRgb(p.lineColor);
    var maxJump=p.cellSize*1.5;
    function svgLayer(roads,r,g,b,sw){
      roads.forEach(function(road){
        if(road.length<2)return;
        var d='';
        for(var i=0;i<road.length-1;i++){
          var f0=normToCanvas(road[i][0],road[i][1],roadsBounds,p.mapZoom);
          var f1=normToCanvas(road[i+1][0],road[i+1][1],roadsBounds,p.mapZoom);
          var v0=flatToFold(f0.x,f0.y,mesh), v1=flatToFold(f1.x,f1.y,mesh);
          var pp0=project(v0), pp1=project(v1);
          var dx=pp1.x-pp0.x, dy=pp1.y-pp0.y;
          if(Math.sqrt(dx*dx+dy*dy)>maxJump){d='';continue;}
          if(!d)d='M'+pp0.x.toFixed(1)+' '+pp0.y.toFixed(1);
          d+='L'+pp1.x.toFixed(1)+' '+pp1.y.toFixed(1);
        }
        if(d)parts.push('<path d="'+d+'" stroke="rgb('+r+','+g+','+b+')" stroke-opacity="'+p.lineOpacity+'" stroke-width="'+sw+'" fill="none" stroke-linecap="round"/>');
      });
    }
    if(p.showRoads) svgLayer(rawRoads,rgb.r,rgb.g,rgb.b,p.strokeW);
    if(p.showRivers) svgLayer(rawRivers,60,130,220,p.strokeW*1.5);
    if(p.showCoast) svgLayer(rawCoast,30,170,200,p.strokeW*2);
  }
  var svg='<?xml version="1.0" encoding="UTF-8"?>\n<svg xmlns="http://www.w3.org/2000/svg" width="'+W+'" height="'+H+'" viewBox="0 0 '+W+' '+H+'">\n'+parts.join('\n')+'\n</svg>';
  var blob=new Blob([svg],{type:'image/svg+xml'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a'); a.download='mapfold.svg'; a.href=url; a.click();
  URL.revokeObjectURL(url);
});

render();
</script>

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Kiln · Still Life Generator</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#e8e4dc;--panel:#f5f2ed;--border:#c8c4bc;--text:#4a4640;--accent:#8b7d6b}
body{background:var(--bg);color:var(--text);font-family:'Helvetica Neue',sans-serif;font-size:13px;display:flex;height:100vh;overflow:hidden}
#panel{width:280px;min-width:280px;background:var(--panel);border-right:1px solid var(--border);display:flex;flex-direction:column;overflow-y:auto;padding:20px;gap:16px}
#canvas-area{flex:1;display:flex;align-items:center;justify-content:center;background:var(--bg)}
canvas{display:block}
.section-title{font-size:10px;letter-spacing:.12em;text-transform:uppercase;color:var(--accent);margin-bottom:10px;font-weight:600}
.row{display:flex;gap:8px;align-items:center;margin-bottom:8px}
.row label{flex:1;font-size:12px;color:var(--text)}
input[type=range]{flex:1;accent-color:var(--accent)}
input[type=color]{width:40px;height:28px;border:1px solid var(--border);border-radius:4px;cursor:pointer;padding:2px}
.btn{background:var(--panel);border:1px solid var(--border);color:var(--text);border-radius:4px;padding:8px 16px;font-family:inherit;font-size:12px;cursor:pointer;transition:all .15s;width:100%}
.btn:hover{background:var(--accent);color:#fff;border-color:var(--accent)}
.val-label{font-size:11px;color:var(--text);width:36px;text-align:right}
.btn-group{display:flex;gap:6px}
.btn-group .btn{flex:1;padding:6px 8px;font-size:11px}
.btn-group .btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
</style>
</head>
<body>
<div id="panel">

  <div>
    <div class="section-title">Scene</div>
    <div class="row">
      <label>Objects</label>
      <input type="range" id="obj-count" min="1" max="6" value="3" step="1"/>
      <span class="val-label" id="obj-val">3</span>
    </div>
    <div class="row">
      <label>Spread</label>
      <input type="range" id="spread" min="20" max="100" value="55" step="5"/>
      <span class="val-label" id="spread-val">55</span>
    </div>
    <div class="row">
      <label>Camera</label>
      <input type="range" id="cam-y" min="-100" max="150" value="60" step="5"/>
      <span class="val-label" id="camy-val">60</span>
    </div>
    <button class="btn" id="btn-new" style="margin-top:4px">New Arrangement</button>
  </div>

  <div>
    <div class="section-title">Light</div>
    <div class="row">
      <label>Angle</label>
      <input type="range" id="light-angle" min="0" max="360" value="135" step="5"/>
      <span class="val-label" id="light-val">135°</span>
    </div>
    <div class="row">
      <label>Elevation</label>
      <input type="range" id="light-elev" min="10" max="90" value="55" step="5"/>
      <span class="val-label" id="elev-val">55°</span>
    </div>
    <div class="row">
      <label>Intensity</label>
      <input type="range" id="light-int" min="20" max="100" value="75" step="5"/>
      <span class="val-label" id="int-val">75</span>
    </div>
    <div class="row">
      <label>Ambient</label>
      <input type="range" id="ambient" min="5" max="60" value="22" step="1"/>
      <span class="val-label" id="amb-val">22</span>
    </div>
  </div>

  <div>
    <div class="section-title">Color</div>
    <div class="row">
      <label>BG</label>
      <input type="color" id="bg-color" value="#cfc9bf"/>
    </div>
    <div class="row">
      <label>Surface</label>
      <input type="color" id="table-color" value="#b8b2a8"/>
    </div>
    <div class="row">
      <label>Saturation</label>
      <input type="range" id="saturation" min="0" max="60" value="18" step="2"/>
      <span class="val-label" id="sat-val">18</span>
    </div>
    <div class="row">
      <label>Segments</label>
      <input type="range" id="segments" min="8" max="48" value="24" step="4"/>
      <span class="val-label" id="seg-val">24</span>
    </div>
  </div>

  <div>
    <div class="section-title">Export</div>
    <button class="btn" id="btn-export">Export PNG</button>
  </div>

</div>
<div id="canvas-area">
  <canvas id="main-canvas" width="800" height="800"></canvas>
</div>

<script>
var W = 800, H = 800;
var canvas = document.getElementById('main-canvas');
var ctx = canvas.getContext('2d');

// ── Lathe profiles ─────────────────────────────────────────────────────────
// Each profile = [[radius, height], ...] normalized 0–1
var PROFILES = {
  vase:   [[0.05,0],[0.28,0.08],[0.38,0.35],[0.28,0.65],[0.32,0.9],[0.26,1.0]],
  bowl:   [[0.08,0],[0.52,0.05],[0.58,0.28],[0.5,0.48],[0.3,0.58],[0.06,0.62]],
  jar:    [[0.18,0],[0.46,0.06],[0.5,0.5],[0.47,0.82],[0.38,0.95],[0.34,1.0]],
  bottle: [[0.12,0],[0.38,0.08],[0.4,0.52],[0.22,0.68],[0.18,0.88],[0.14,1.0]],
  cup:    [[0.2,0],[0.24,0.04],[0.3,0.55],[0.32,0.6],[0.05,0.62]],
  urn:    [[0.1,0],[0.5,0.1],[0.55,0.55],[0.45,0.75],[0.55,0.85],[0.48,0.95],[0.42,1.0]]
};

var PROFILE_KEYS = Object.keys(PROFILES);

var scene = []; // [{profile, x, z, scale, hue}]

// ── Seeded random ──────────────────────────────────────────────────────────
var seed = Math.floor(Math.random() * 99999);
function sr() { seed = (seed * 1664525 + 1013904223) & 0xffffffff; return (seed >>> 0) / 0xffffffff; }
function resetSeed(s) { seed = s; }

// ── Generate scene ─────────────────────────────────────────────────────────
var currentSeed = seed;
function generateScene() {
  currentSeed = Math.floor(Math.random() * 99999);
  buildScene();
}
function buildScene() {
  resetSeed(currentSeed);
  var count = parseInt(document.getElementById('obj-count').value);
  var spread = parseInt(document.getElementById('spread').value);
  scene = [];
  for (var i = 0; i < count; i++) {
    var prof = PROFILE_KEYS[Math.floor(sr() * PROFILE_KEYS.length)];
    var x = (sr() - 0.5) * spread * 5;
    var z = (sr() - 0.5) * spread * 2 - 80;
    var sc = 60 + sr() * 80;
    var hue = 20 + sr() * 300; // morandi range
    scene.push({ profile: prof, x: x, z: z, scale: sc, hue: hue });
  }
  scene.sort(function(a, b) { return a.z - b.z; });
}

// ── 3D helpers ─────────────────────────────────────────────────────────────
function project(vx, vy, vz, camY) {
  var fov = 700;
  var depthScale = fov / (fov - vz);
  return {
    sx: W/2 + vx * depthScale,
    sy: H/2 + camY + vy * depthScale,
    d:  depthScale
  };
}

function vecNormal(v0, v1, v2) {
  var ax=v1[0]-v0[0], ay=v1[1]-v0[1], az=v1[2]-v0[2];
  var bx=v2[0]-v0[0], by=v2[1]-v0[1], bz=v2[2]-v0[2];
  var nx=ay*bz-az*by, ny=az*bx-ax*bz, nz=ax*by-ay*bx;
  var l=Math.sqrt(nx*nx+ny*ny+nz*nz); if(l<1e-6) return [0,1,0];
  return [nx/l, ny/l, nz/l];
}

// ── Build lathe triangles ──────────────────────────────────────────────────
function buildLathe(profileKey, segments) {
  var profile = PROFILES[profileKey];
  var rings = [];
  for (var ri = 0; ri < profile.length; ri++) {
    var rad = profile[ri][0];
    var ht  = profile[ri][1];
    var ring = [];
    for (var si = 0; si <= segments; si++) {
      var a = (si / segments) * Math.PI * 2;
      ring.push([rad * Math.cos(a), -ht, rad * Math.sin(a)]);
    }
    rings.push(ring);
  }
  var tris = [];
  for (var ri = 0; ri < rings.length - 1; ri++) {
    for (var si = 0; si < segments; si++) {
      var a = rings[ri][si], b = rings[ri][si+1];
      var c = rings[ri+1][si+1], d = rings[ri+1][si];
      tris.push([a, b, c]);
      tris.push([a, c, d]);
    }
  }
  return tris;
}

// ── Morandi color ──────────────────────────────────────────────────────────
function morandiColor(hue, brightness, saturation) {
  var sat = saturation * 0.6;
  var val = 30 + brightness * 55;
  // HSV to RGB
  var h = hue / 60;
  var s = sat / 100;
  var v = val / 100;
  var i = Math.floor(h);
  var f = h - i;
  var p = v * (1 - s);
  var q = v * (1 - s * f);
  var t = v * (1 - s * (1 - f));
  var r, g, b;
  switch(i % 6) {
    case 0: r=v;g=t;b=p;break; case 1: r=q;g=v;b=p;break;
    case 2: r=p;g=v;b=t;break; case 3: r=p;g=q;b=v;break;
    case 4: r=t;g=p;b=v;break; default: r=v;g=p;b=q;break;
  }
  return [Math.round(r*255), Math.round(g*255), Math.round(b*255)];
}

// ── Render ─────────────────────────────────────────────────────────────────
function render() {
  var camY      = parseInt(document.getElementById('cam-y').value);
  var lightDeg  = parseInt(document.getElementById('light-angle').value);
  var lightElev = parseInt(document.getElementById('light-elev').value) * Math.PI / 180;
  var lightInt  = parseInt(document.getElementById('light-int').value) / 100;
  var ambient   = parseInt(document.getElementById('ambient').value) / 100;
  var saturation= parseInt(document.getElementById('saturation').value);
  var segments  = parseInt(document.getElementById('segments').value);
  var bgColor   = document.getElementById('bg-color').value;
  var tableColor= document.getElementById('table-color').value;

  // Light direction
  var la = lightDeg * Math.PI / 180;
  var lx = Math.cos(la) * Math.cos(lightElev);
  var ly = -Math.sin(lightElev);
  var lz = Math.sin(la) * Math.cos(lightElev);
  var ll = Math.sqrt(lx*lx+ly*ly+lz*lz); lx/=ll;ly/=ll;lz/=ll;

  // Background
  ctx.fillStyle = bgColor;
  ctx.fillRect(0, 0, W, H);

  // Table surface — horizon line
  var horizonY = H/2 + camY + 120;
  var tableC = hexToRgb(tableColor);
  var grad = ctx.createLinearGradient(0, horizonY, 0, H);
  grad.addColorStop(0, tableColor);
  grad.addColorStop(1, shadeColor(tableColor, -15));
  ctx.fillStyle = grad;
  ctx.fillRect(0, horizonY, W, H - horizonY);

  // Soft horizon line
  var hGrad = ctx.createLinearGradient(0, horizonY - 20, 0, horizonY + 20);
  hGrad.addColorStop(0, 'rgba(0,0,0,0)');
  hGrad.addColorStop(0.5, 'rgba(0,0,0,0.06)');
  hGrad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = hGrad;
  ctx.fillRect(0, horizonY - 20, W, 40);

  buildScene();

  // Collect all triangles from all vessels for painter's sort
  var allTris = [];

  scene.forEach(function(obj) {
    var tris = buildLathe(obj.profile, segments);
    var maxH = obj.scale;
    var baseY = horizonY - (H/2 + camY); // screen-space base

    tris.forEach(function(tri) {
      // Transform: scale + translate
      var tv = tri.map(function(v) {
        return [
          v[0] * obj.scale + obj.x,
          v[1] * maxH - maxH,
          v[2] * obj.scale + obj.z
        ];
      });

      // Projected
      var pp = tv.map(function(v) { return project(v[0], v[1], v[2], camY + 120); });

      // Back-face cull (simplified: skip if normal faces away)
      var nx = (pp[1].sx-pp[0].sx)*(pp[2].sy-pp[0].sy) - (pp[1].sy-pp[0].sy)*(pp[2].sx-pp[0].sx);
      if (nx > 0) return; // back face

      // Lighting
      var n = vecNormal(tv[0], tv[1], tv[2]);
      var dot = n[0]*lx + n[1]*ly + n[2]*lz;
      var brightness = ambient + (1-ambient) * Math.max(0, dot) * lightInt;

      // Avg depth for sorting
      var avgZ = (tv[0][2] + tv[1][2] + tv[2][2]) / 3;

      allTris.push({
        pp: pp, brightness: brightness, hue: obj.hue, avgZ: avgZ
      });
    });
  });

  // Sort back to front
  allTris.sort(function(a, b) { return a.avgZ - b.avgZ; });

  // Draw
  allTris.forEach(function(tri) {
    var pp = tri.pp;
    var rgb = morandiColor(tri.hue, tri.brightness, saturation);
    ctx.beginPath();
    ctx.moveTo(pp[0].sx, pp[0].sy);
    ctx.lineTo(pp[1].sx, pp[1].sy);
    ctx.lineTo(pp[2].sx, pp[2].sy);
    ctx.closePath();
    ctx.fillStyle = 'rgb('+rgb[0]+','+rgb[1]+','+rgb[2]+')';
    ctx.fill();
    // Subtle edge
    ctx.strokeStyle = 'rgba(0,0,0,0.04)';
    ctx.lineWidth = 0.3;
    ctx.stroke();
  });

  // Shadow under each vessel (ellipse)
  scene.forEach(function(obj) {
    var pp = project(obj.x, 0, obj.z, camY + 120);
    var rx = obj.scale * 0.52 * pp.d;
    var ry = rx * 0.18;
    ctx.save();
    ctx.globalAlpha = 0.15;
    var sg = ctx.createRadialGradient(pp.sx, pp.sy, 0, pp.sx, pp.sy, rx);
    sg.addColorStop(0, 'rgba(0,0,0,0.5)');
    sg.addColorStop(1, 'rgba(0,0,0,0)');
    ctx.fillStyle = sg;
    ctx.beginPath();
    ctx.ellipse(pp.sx, pp.sy, rx, ry, 0, 0, Math.PI*2);
    ctx.fill();
    ctx.restore();
  });
}

function hexToRgb(hex) {
  return { r:parseInt(hex.slice(1,3),16), g:parseInt(hex.slice(3,5),16), b:parseInt(hex.slice(5,7),16) };
}
function shadeColor(hex, pct) {
  var c = hexToRgb(hex);
  var r = Math.max(0, Math.min(255, c.r + pct));
  var g = Math.max(0, Math.min(255, c.g + pct));
  var b = Math.max(0, Math.min(255, c.b + pct));
  return 'rgb('+r+','+g+','+b+')';
}

// ── Controls ───────────────────────────────────────────────────────────────
function bindSlider(id, valId, suffix) {
  var el=document.getElementById(id), vl=document.getElementById(valId);
  el.addEventListener('input',function(){ vl.textContent=el.value+(suffix||''); render(); });
}
bindSlider('obj-count','obj-val','');
bindSlider('spread','spread-val','');
bindSlider('cam-y','camy-val','');
bindSlider('light-angle','light-val','°');
bindSlider('light-elev','elev-val','°');
bindSlider('light-int','int-val','');
bindSlider('ambient','amb-val','');
bindSlider('saturation','sat-val','');
bindSlider('segments','seg-val','');
['bg-color','table-color'].forEach(function(id){
  document.getElementById(id).addEventListener('input', render);
});

document.getElementById('btn-new').addEventListener('click', function() {
  generateScene();
  render();
});

document.getElementById('btn-export').addEventListener('click', function() {
  var a = document.createElement('a');
  a.download = 'kiln-still-life.png';
  a.href = canvas.toDataURL('image/png');
  a.click();
});

// Initial
generateScene();
render();
</script>
</body>
</html>
